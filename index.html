<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نور الإسلام | القرآن الكريم كاملاً</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #165230;
            --gold: #C9A84C;
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --text: #2D3436;
            --shadow: rgba(0,0,0,0.1);
        }

        .dark-mode {
            --bg: #121212;
            --card-bg: #1E1E1E;
            --text: #E0E0E0;
            --primary: #2A9D5C;
            --shadow: rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: background 0.3s, color 0.3s; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            user-select: none;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(-45deg, #1e3a8a, #4338ca, #165230, #0f766e);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            box-shadow: 0 4px 20px var(--shadow);
            border-bottom: 4px solid var(--gold);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .theme-toggle {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 10005;
            background: var(--gold);
            border: 2px solid white;
            width: 45px; height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .search-container {
            max-width: 600px;
            margin: 20px auto 0;
        }

        .search-input {
            width: 100%;
            padding: 14px 25px;
            border-radius: 50px;
            border: none;
            font-family: 'Cairo';
            font-size: 1rem;
            outline: none;
            background: white;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .surah-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--shadow);
            border: 1px solid transparent;
        }
        .surah-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .surah-card h3 { font-family: 'Amiri'; font-size: 1.8rem; color: var(--primary); }

        #reciters-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            padding: 10px 0;
        }

        .reciter-item {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-right: 6px solid var(--primary);
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.3s ease;
        }

        .reciter-item:hover {
            background: var(--primary);
            color: white;
            transform: translateX(-5px);
        }

        #player-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--card-bg);
            border-top: 3px solid var(--gold);
            padding: 10px 20px;
            display: none;
            z-index: 10002;
            box-shadow: 0 -5px 20px var(--shadow);
        }

        .audio-controls {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .download-btn {
            background: #2d3436;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* باقى الاستايلات كما هي */
        #quran-viewer { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; overflow-y: auto; padding: 100px 20px 150px; }
        .quran-content { font-family: 'Amiri'; font-size: 2.4rem; line-height: 2.5; text-align: center; max-width: 850px; margin: 0 auto; }
        .ayah-unit { padding: 0 8px; border-radius: 5px; cursor: pointer; }
        .is-hidden { background: #ccc !important; color: #ccc !important; }
        .reading-controls { position: fixed; bottom: 100px; right: 30px; background: var(--primary); color: white; padding: 15px; border-radius: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10001; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 20000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 25px; width: 90%; max-width: 500px; text-align: center; }
        .mode-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-close { position: fixed; top: 25px; right: 25px; background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 50px; z-index: 10003; cursor: pointer; }
        .tafsir-box { position: fixed; bottom: -100%; left: 0; right: 0; background: var(--card-bg); padding: 30px; border-top-left-radius: 30px; border-top-right-radius: 30px; box-shadow: 0 -10px 40px rgba(0,0,0,0.3); z-index: 100000; transition: 0.5s; max-height: 60vh; overflow-y: auto; }
        .tafsir-box.active { bottom: 0; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<header>
    <h1>نور الإسلام</h1>
    <p>بوابتك المتكاملة لتلاوة وحفظ وفهم القرآن الكريم</p>
    <div class="search-container">
        <input type="text" class="search-input" id="global-search" placeholder="  ابحث عن سورة ...." oninput="filterSurahs()">
    </div>
</header>

<div class="container" id="main-ui">
    <div class="surah-grid" id="grid"></div>
</div>

<div class="modal" id="mode-modal">
    <div class="modal-content">
        <h2 id="m-title" style="margin-bottom:20px;">اسم السورة</h2>
        <button class="mode-btn" style="background:#165230" onclick="launch('read')">📖 وضع القراءة والتفسير</button>
        <button class="mode-btn" style="background:#34495e" onclick="launch('mem')">🧠 وضع الحفظ التفاعلي</button>
        <button class="mode-btn" style="background:#C9A84C" onclick="launch('listen')">🎧 وضع الاستماع</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#888; cursor:pointer; margin-top:10px;">إلغاء</button>
    </div>
</div>

<div id="quran-viewer">
    <button class="btn-close" onclick="exitView()">خروج ✖</button>
    <div id="quran-render" class="quran-content"></div>
    <div class="reading-controls">
        <label style="font-size: 0.8rem;">التمرير التلقائي</label>
        <select id="scroll-speed" onchange="initScroll()" style="background:rgba(255,255,255,0.2); color:white; border:1px solid white; padding:5px; border-radius:5px;">
            <option value="0">متوقف</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
        </select>
    </div>
</div>

<div id="reciters-view" class="container" style="display:none;">
    <button class="btn-close" onclick="exitView()">عودة 🔙</button>
    <h2 id="l-title" style="text-align:center; margin-bottom:20px;">قائمة القراء</h2>
    <input type="text" class="search-input" id="reciter-search" placeholder="ابحث عن قارئ..." oninput="filterReciters()" style="margin-bottom:20px;">
    <div id="reciters-list"></div>
</div>

<div id="player-bar">
    <div class="audio-controls">
        <div class="player-info">
            <div>
                <h4 id="p-name">اسم القارئ</h4>
                <p id="p-desc" style="font-size:0.8rem; color:var(--gold)">الرواية</p>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <a id="download-link" href="#" download class="download-btn">تحميل MP3 📥</a>
                <button id="master-play" onclick="toggleAudio()" style="background:var(--primary); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">▶</button>
            </div>
        </div>
        <div class="progress-container">
            <span id="current-time" style="font-size:0.8rem">0:00</span>
            <input type="range" id="seek-slider" value="0" step="1">
            <span id="total-duration" style="font-size:0.8rem">0:00</span>
        </div>
    </div>
    <audio id="audio-engine"></audio>
</div>

<div id="tafsir-panel" class="tafsir-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="color:var(--gold)">التفسير الميسر</h3>
        <button onclick="closeTafsir()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
    </div>
    <p id="tafsir-text" style="line-height:1.8; font-size:1.2rem;"></p>
</div>

<script>
    let surahs = [];
    let reciters = [];
    let activeSurah = null;
    let scrollInterval = null;

    // وظيفة تنظيف النصوص للبحث الذكي
    function normalizeText(text) {
        return text
            .replace(/[\u064B-\u065F]/g, "") // حذف التشكيل
            .replace(/[أإآ]/g, "ا")
            .replace(/ة/g, "ه")
            .replace(/[ىي]/g, "ي")
            .trim();
    }

    async function startApp() {
        try {
            const sRes = await fetch('https://api.alquran.cloud/v1/surah');
            const sData = await sRes.json();
            surahs = sData.data;
            renderSurahs(surahs);

            const rRes = await fetch('https://mp3quran.net/api/v3/reciters?language=ar');
            const rData = await rRes.json();
            reciters = rData.reciters;
        } catch (e) { console.error("Error loading data"); }
    }

    function renderSurahs(list) {
        document.getElementById('grid').innerHTML = list.map(s => `
            <div class="surah-card" onclick="openOptions(${s.number})">
                <h3>${s.name}</h3>
                <p>آياتها: ${s.numberOfAyahs}</p>
            </div>
        `).join('');
    }

    function filterSurahs() {
        const query = normalizeText(document.getElementById('global-search').value);
        const filtered = surahs.filter(s => normalizeText(s.name).includes(query));
        renderSurahs(filtered);
    }

    function openOptions(num) {
        activeSurah = surahs.find(s => s.number === num);
        document.getElementById('m-title').innerText = activeSurah.name;
        document.getElementById('mode-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('mode-modal').style.display = 'none'; }

    function launch(mode) {
        closeModal();
        if(mode === 'listen') {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('reciters-view').style.display = 'block';
            renderReciters(reciters.slice(0, 50));
        } else {
            showReader(mode);
        }
    }

    async function showReader(mode) {
        document.getElementById('quran-viewer').style.display = 'block';
        const render = document.getElementById('quran-render');
        render.innerHTML = "جاري التحميل...";
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${activeSurah.number}`);
        const data = await res.json();
        
        render.innerHTML = `<h1 style="color:var(--gold); margin-bottom:40px;">${activeSurah.name}</h1>`;
        data.data.ayahs.forEach(a => {
            const span = document.createElement('span');
            span.className = `ayah-unit ${mode === 'mem' ? 'is-hidden' : ''}`;
            span.innerHTML = `${a.text} <b style="color:var(--primary)">(${a.numberInSurah})</b> `;
            span.onclick = () => {
                if(mode === 'mem') span.classList.toggle('is-hidden');
                else getTafsir(activeSurah.number, a.numberInSurah);
            };
            render.appendChild(span);
        });
    }

    function renderReciters(list) {
        const listDiv = document.getElementById('reciters-list');
        listDiv.innerHTML = list.map(r => `
            <div class="reciter-item" onclick="showNarrations(${r.id})">
                <span>الشيخ: ${r.name}</span>
                <button style="background:var(--gold); color:white; border:none; padding:5px 10px; border-radius:5px;">عرض</button>
            </div>
        `).join('');
    }

    function filterReciters() {
        const query = normalizeText(document.getElementById('reciter-search').value);
        const filtered = reciters.filter(r => normalizeText(r.name).includes(query));
        renderReciters(filtered.slice(0, 50));
    }

    function showNarrations(id) {
        const r = reciters.find(x => x.id === id);
        const listDiv = document.getElementById('reciters-list');
        document.getElementById('l-title').innerText = "روايات " + r.name;
        listDiv.innerHTML = r.moshaf.map(m => `
            <div class="reciter-item" onclick="playAudio('${m.server}', '${m.surah_list}', '${r.name}', '${m.name}')">
                <span>${m.name}</span>
                <button style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:5px;">تشغيل ▶</button>
            </div>
        `).join('') + `<button onclick="launch('listen')" style="grid-column: 1/-1; padding:15px; border-radius:15px; background:#ddd; border:none; cursor:pointer;">العودة للقراء</button>`;
    }

    // إدارة الصوت المتقدمة
    const audio = document.getElementById('audio-engine');
    const seekSlider = document.getElementById('seek-slider');

    function playAudio(server, list, name, moshaf) {
        const sNum = activeSurah.number.toString().padStart(3, '0');
        if(!list.split(',').includes(activeSurah.number.toString())) { alert("السورة غير متوفرة"); return; }
        
        const fileUrl = `${server}${sNum}.mp3`;
        audio.src = fileUrl;
        document.getElementById('p-name').innerText = name;
        document.getElementById('p-desc').innerText = "سورة " + activeSurah.name + " - " + moshaf;
        document.getElementById('download-link').href = fileUrl;
        document.getElementById('player-bar').style.display = 'block';
        audio.play();
    }

    audio.ontimeupdate = () => {
        const current = audio.currentTime;
        const duration = audio.duration;
        seekSlider.value = (current / duration) * 100 || 0;
        document.getElementById('current-time').innerText = formatTime(current);
        if(duration) document.getElementById('total-duration').innerText = formatTime(duration);
    };

    seekSlider.oninput = () => {
        const time = (seekSlider.value * audio.duration) / 100;
        audio.currentTime = time;
    };

    function formatTime(secs) {
        const min = Math.floor(secs / 60);
        const sec = Math.floor(secs % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function toggleAudio() { audio.paused ? audio.play() : audio.pause(); }
    audio.onplay = () => document.getElementById('master-play').innerText = "⏸";
    audio.onpause = () => document.getElementById('master-play').innerText = "▶";

    // الوظائف المساعدة
    async function getTafsir(sNum, aNum) {
        const textElement = document.getElementById('tafsir-text');
        textElement.innerText = "جاري جلب التفسير...";
        document.getElementById('tafsir-panel').classList.add('active');
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/ayah/${sNum}:${aNum}/ar.jalalayn`);
            const data = await res.json();
            textElement.innerText = data.data.text;
        } catch (e) { textElement.innerText = "عذراً، تعذر جلب التفسير."; }
    }

    function closeTafsir() { document.getElementById('tafsir-panel').classList.remove('active'); }
    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    function exitView() { clearInterval(scrollInterval); location.reload(); }
    function initScroll() {
        clearInterval(scrollInterval);
        const speed = document.getElementById('scroll-speed').value;
        if(speed > 0) scrollInterval = setInterval(() => { document.getElementById('quran-viewer').scrollBy(0, 1); }, 100 / speed);
    }

    startApp();
</script>
</body>
</html>
